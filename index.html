<!DOCTYPE html>
<html lang="zh-TW">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>SAVE & LOAD | Official Site</title>
     <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

     <nav class="navbar">
          <div class="nav-container">
               <div class="logo-wrapper">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ-g3ndPhxWcYfm9A5Bqsb6zL4CA5qlgTtO5A&s" alt="SAVE & LOAD Logo" class="nav-logo">
                    <span class="logo-text">SAVE & LOAD</span>
               </div>
               <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="搜尋酒單、成分...">
               </div>
          </div>
     </nav>

     <header class="hero">
          <div class="hero-content fade-in">
               <h1>Life Hard, <br><span class="highlight">Play Harder.</span></h1>
               <p>建立你的遊戲存檔，開始今晚的冒險。</p>
               <div class="status-badge">伺服器狀態：開放中 {20:00~3:00}</div>
          </div>
     </header>

     <div class="main-content">
          <section class="info-photo-section fade-in">
               <div class="info-grid">
                    <div class="info-card">
                         <h3>最低消費</h3>
                         <p>NT$300 / 每人單次登入</p>
                    </div>
                    <div class="info-card">
                         <h3>關服維護</h3>
                         <p>每週二固定關服</p>
                    </div>
                    <div class="info-card">
                         <h3>外食規則</h3>
                         <p>歡迎外食，但我們也有簡單吃的</p>
                    </div>
               </div>

               <div class="photo-gallery">
                    <div class="gallery-item">
                         <img src="path/to/your/bar_photo_1.jpg" alt="酒吧氛圍 1" class="gallery-img">
                    </div>
                    <div class="gallery-item">
                         <img src="path/to/your/cocktail_photo_1.jpg" alt="調酒展示 1" class="gallery-img">
                    </div>
                    <div class="gallery-item">
                         <img src="path/to/your/bar_photo_2.jpg" alt="酒吧氛圍 2" class="gallery-img">
                    </div>
               </div>
          </section>

          <main id="menuContainer" class="fade-in">
               <div class="loading">正在讀取選單存檔...</div>
          </main>
     </div>

     <footer class="footer">
          <div class="footer-inner">
               <p>© SAVE & LOAD. All Rights Reserved.</p>
               <p class="warning">未滿十八歲禁止飲酒。酒後不開車，安全有保障。</p>
          </div>
     </footer>

     <script>
          let flatItems = [];

          async function init() {
               try {
                    const response = await fetch('Menu.json');
                    const data = await response.json();

                    // 扁平化資料方便搜尋與渲染
                    data.menu_standardized.forEach(cat => {
                         cat.items.forEach(item => {
                              flatItems.push({
                                   ...item,
                                   category: cat.category,
                                   displayPrice: item.price !== undefined ? item.price : cat.price_default
                              });
                         });
                    });
                    render(flatItems);
                    setupScrollEffect(); // 啟動捲動淡入特效
               } catch (e) {
                    console.error(e);
                    document.getElementById('menuContainer').innerHTML = "<p class='error'>存檔讀取失敗。請確認是否使用 Live Server 開啟。</p>";
               }
          }

          function render(items) {
               const container = document.getElementById('menuContainer');
               const categories = [...new Set(items.map(i => i.category))];

               if (items.length === 0) {
                    container.innerHTML = '<div class="no-result">沒有找到相關品項</div>';
                    return;
               }

               let html = '';
               categories.forEach(cat => {
                    const sectionItems = items.filter(i => i.category === cat);
                    html += `
                         <section class="menu-group">
                             <h2 class="category-title">${cat}</h2>
                             <div class="items-grid">
                                 ${sectionItems.map(item => `
                                     <div class="item-card">
                                         <div class="item-info">
                                             <span class="item-type">${item.type}</span>
                                             <h4 class="item-name">${item.name}</h4>
                                             <p class="item-contents">${item.contents.join(' / ')}</p>
                                         </div>
                                         <div class="item-price">
                                             ${item.displayPrice > 0 ? 'NT$' + item.displayPrice : '價格電洽'}
                                         </div>
                                     </div>
                                 `).join('')}
                             </div>
                         </section>
                     `;
               });
               container.innerHTML = html;
          }

          // 搜尋功能
          document.getElementById('searchInput').addEventListener('input', (e) => {
               const keyword = e.target.value.toLowerCase();
               const filtered = flatItems.filter(i =>
                    i.name.toLowerCase().includes(keyword) ||
                    i.contents.some(c => c.toLowerCase().includes(keyword)) ||
                    i.category.toLowerCase().includes(keyword)
               );
               render(filtered);
          });

          // 捲動淡入特效邏輯 (Intersection Observer)
          function setupScrollEffect() {
               const observers = document.querySelectorAll('.fade-in');
               const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                         if (entry.isIntersecting) {
                              entry.target.classList.add('visible');
                         }
                    });
               }, { threshold: 0.1 }); // 捲動到 10% 可見時觸發

               observers.forEach(obs => observer.observe(obs));
          }

          init();
     </script>
</body>
</html>
